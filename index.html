    <title>VIP-KAART — Interactieve Kaart</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root {
            --brand-blue: #1e40af;
            --brand-indigo: #4338ca;
            --brand-emerald: #10b981;
        }

        body {
            font-family: 'Outfit', sans-serif;
            overflow: hidden;
        }

        #map {
            z-index: 1;
        }

        /* Premium Scrollbar */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        /* Glassmorphism & Effects */
        .glass-header {
            background: rgba(30, 64, 175, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .filter-btn {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .filter-btn.active {
            background-color: var(--brand-blue) !important;
            color: white !important;
            box-shadow: 0 4px 12px rgba(30, 64, 175, 0.3);
            transform: translateY(-1px);
        }

        .place-card {
            transition: all 0.3s ease;
        }

        .place-card:hover {
            transform: translateX(4px);
            border-color: #3b82f6;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .leaflet-popup-content-wrapper {
            border-radius: 16px;
            padding: 8px;
        }

        .leaflet-popup-content {
            font-family: 'Outfit', sans-serif;
            font-size: 14px;
            line-height: 1.5;
        }

        @media (max-width: 1024px) {
            .main-container {
                flex-direction: column;
            }

            .sidebar {
                height: 45vh;
                border-top: 1px solid #e2e8f0;
                transition: height 0.3s cubic-bezier(0.4, 0, 0.2, 1);
                max-height: 95vh;
            }

            .sidebar.dragging {
                transition: none !important;
            }

            #map {
                height: 100%;
            }

            /* Smaller list items on mobile */
            .place-card {
                padding: 10px !important;
                margin-bottom: 8px !important;
            }

            .place-card h4 {
                font-size: 13px !important;
            }

            .place-card p {
                font-size: 10px !important;
            }

            .place-card span {
                font-size: 9px !important;
            }

            .header-info {
                display: none;
            }
        }
    </style>
</head>

            zoomControl: false
        }).setView([52.3, 5.0], 8);

        L.control.zoom({
            position: 'topright'
        }).addTo(map);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
            subdomains: 'abcd',
            maxZoom: 20
        }).addTo(map);

        let currentMarkers = [];
        let currentFilter = 'all';

        function addMarker(place) {
            const isGratis = place.benefit.toLowerCase().includes('gratis');
            const color = isGratis ? '#10b981' : '#1e40af';

            const markerHtml = `
                <div style="background-color: ${color}; width: 12px; height: 12px; border: 2px solid white; border-radius: 50%; box-shadow: 0 0 10px rgba(0,0,0,0.3);"></div>
            `;

            const customIcon = L.divIcon({
                html: markerHtml,
                className: 'custom-marker',
                iconSize: [12, 12]
            });

            const marker = L.marker([place.lat, place.lng], { icon: customIcon }).addTo(map);

            const popupContent = `
                <div class="p-1">
                    <p class="font-bold text-slate-800 mb-1">${place.name}</p>
                    <p class="text-xs text-slate-500 mb-2">📍 ${place.location}</p>
                    <div class="inline-block px-2 py-1 rounded-lg text-[10px] font-bold uppercase tracking-wider ${isGratis ? 'bg-emerald-100 text-emerald-700' : 'bg-blue-100 text-blue-700'}">
                        ${place.benefit}
                    </div>
                </div>
            `;

            marker.bindPopup(popupContent);
            currentMarkers.push({ marker, place });
        }

        function clearMarkers() {
            currentMarkers.forEach(m => map.removeLayer(m.marker));
            currentMarkers = [];
        }

        function renderList(filtered) {
            const container = document.getElementById('placeList');
            container.innerHTML = '';

            if (filtered.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-20">
                        <p class="text-slate-400 text-sm">Geen resultaten gevonden...</p>
                    </div>
                `;
                return;
            }

            filtered.forEach(place => {
                const isGratis = place.benefit.toLowerCase().includes('gratis');
                const div = document.createElement('div');
                div.className = `place-card p-5 rounded-2xl cursor-pointer border border-slate-100 bg-white shadow-sm ${isGratis ? 'bg-emerald-50/30' : ''}`;
                div.innerHTML = `
                    <div class="flex justify-between items-start gap-3">
                        <div>
                            <h4 class="font-semibold text-slate-800 leading-tight">${place.name}</h4>
                            <p class="text-xs text-slate-500 mt-1 flex items-center gap-1">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                                </svg>
                                ${place.location}
                            </p>
                        </div>
                        <span class="shrink-0 px-2 py-1 rounded-lg text-[10px] font-extrabold uppercase tracking-tighter ${isGratis ? 'bg-emerald-100 text-emerald-700' : 'bg-amber-100 text-amber-700'}">
                            ${isGratis ? '100% Gratis' : 'Korting'}
                        </span>
                    </div>
                    <div class="mt-3 pt-3 border-t border-slate-50 flex items-center justify-between">
                        <p class="text-xs font-bold ${isGratis ? 'text-emerald-600' : 'text-blue-600'}">${place.benefit}</p>
                        <button class="text-slate-300 hover:text-blue-500 transition-colors">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
                            </svg>
                        </button>
                    </div>
                `;
                div.onclick = () => {
                    const zoomLevel = window.innerWidth < 1024 ? 12 : 15;
                    map.flyTo([place.lat, place.lng], zoomLevel, { duration: 1.5 });
                    const marker = currentMarkers.find(m => m.place === place);
                    if (marker) {
                        setTimeout(() => marker.marker.openPopup(), 1500);
                    }
                    if (window.innerWidth < 1024) {
                        // On mobile, maybe scroll the map into view if needed
                    }
                };
                container.appendChild(div);
            });
        }

        function setFilter(type) {
            currentFilter = type;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            if (type === 'all') document.getElementById('btn-all').classList.add('active');
            if (type === 'gratis') document.getElementById('btn-gratis').classList.add('active');
            if (type === 'korting') document.getElementById('btn-korting').classList.add('active');
            applyFilters();
        }

        function applyFilters() {
            const query = document.getElementById('search').value.toLowerCase();
            let filtered = places.filter(place => {
                const matchesSearch = place.name.toLowerCase().includes(query) ||
                    place.location.toLowerCase().includes(query) ||
                    place.benefit.toLowerCase().includes(query);
                if (!matchesSearch) return false;
                if (currentFilter === 'gratis') return place.benefit.toLowerCase().includes('gratis');
                if (currentFilter === 'korting') {
                    return !place.benefit.toLowerCase().includes('gratis') &&
                        (place.benefit.includes('%') || place.benefit.toLowerCase().includes('korting') || place.benefit.toLowerCase().includes('voordeel'));
                }
                return true;
            });

            clearMarkers();
            filtered.forEach(addMarker);
            renderList(filtered);
        }

        // Init
        places.forEach(addMarker);
        renderList(places);
        document.getElementById('search').addEventListener('input', applyFilters);

        // Dragging Logic
        const sidebar = document.getElementById('mobileSidebar');
        const header = document.getElementById('sidebarHeader');
        let startY, startHeight, isDragging = false;

        const getThresholds = () => ({
            collapsed: 80,
            half: window.innerHeight * 0.45,
            full: window.innerHeight * 0.85
        });

        function onStart(e) {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'BUTTON' || e.target.closest('button')) return;
            isDragging = true;
            startY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
            startHeight = sidebar.offsetHeight;
            sidebar.classList.add('dragging');
        }

        function onMove(e) {
            if (!isDragging) return;
            const currentY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
            const delta = startY - currentY;
            let newHeight = startHeight + delta;

            if (newHeight < 64) newHeight = 64;
            if (newHeight > window.innerHeight * 0.95) newHeight = window.innerHeight * 0.95;

            sidebar.style.height = newHeight + 'px';
            e.preventDefault();
        }

        function onEnd() {
            if (!isDragging) return;
            isDragging = false;
            sidebar.classList.remove('dragging');

            const currentHeight = sidebar.offsetHeight;
            const t = getThresholds();
            let target;

            if (currentHeight < (t.half + t.collapsed) / 2) {
                target = t.collapsed;
            } else if (currentHeight < (t.full + t.half) / 2) {
                target = t.half;
            } else {
                target = t.full;
            }

            sidebar.style.height = target + 'px';
            startY = null;
            setTimeout(() => map.invalidateSize(), 350);
        }

        header.addEventListener('touchstart', onStart, { passive: true });
        header.addEventListener('mousedown', onStart);

        document.addEventListener('touchmove', onMove, { passive: false });
        document.addEventListener('mousemove', onMove);

        document.addEventListener('touchend', onEnd);
        document.addEventListener('mouseup', onEnd);

        // Desktop synchronization
        function setFilter(type) {
            currentFilter = type;
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));

            const suffixes = ['', '-desktop'];
            suffixes.forEach(s => {
                const el = document.getElementById('btn-' + type + s);
                if (el) el.classList.add('active');
            });

            applyFilters();
        }
    </script>
</body>

</html>
